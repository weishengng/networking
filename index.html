    body {
      margin: 0;
      display: flex;
      height: 100vh;
      font-family: 'Orbitron', sans-serif;
      background: radial-gradient(circle at top, #020617, #000000);
      color: #00eaff;
    }
  
    /* Sidebar */
    .sidebar {
      width: 30%;
      background: rgba(0, 0, 0, 0.9);
      border-right: 2px solid #00eaff;
      box-shadow: 0 0 20px #00eaff inset;
      overflow-y: auto;
      padding: 15px;
    }
  
    .sidebar h2 {
      text-align: center;
      color: #00eaff;
      text-shadow: 0 0 10px #00eaff;
      letter-spacing: 2px;
    }
  
    /* Name list */
    .name {
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #00eaff;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
      background: rgba(0, 234, 255, 0.05);
    }
  
    .name:hover {
      background: #00eaff;
      color: black;
      box-shadow: 0 0 15px #00eaff;
      transform: translateX(8px);
    }
  
    .name.active {
      background: #00eaff;
      color: black;
      font-weight: bold;
      box-shadow: 0 0 20px #00eaff;
    }
  
    /* Content area */
    .content {
      width: 70%;
      padding: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  
    /* Card */
    .card {
      width: 100%;
      max-width: 550px;
      padding: 25px;
      border: 2px solid #00eaff;
      border-radius: 12px;
      background: rgba(0, 234, 255, 0.05);
      box-shadow: 
        0 0 10px #00eaff,
        inset 0 0 20px rgba(0, 234, 255, 0.2);
      backdrop-filter: blur(10px);
    }
  
    .card h3 {
      margin-top: 0;
      text-align: center;
      text-shadow: 0 0 10px #00eaff;
      letter-spacing: 1px;
    }
  
    .card p {
      margin: 12px 0;
      border-bottom: 1px solid rgba(0,234,255,0.2);
      padding-bottom: 5px;
    }
  
    .card b {
      color: #7dd3fc;
    }
  </style>
