  <style>
    /* BODY + TRON BACKGROUND */
    body {
      margin: 0;
      display: flex;
      height: 100vh;
      font-family: 'Orbitron', sans-serif;
      color: #00eaff;
      overflow: hidden;
      background: black;
    }

    /* GRID ANIMATION */
    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background:
        linear-gradient(#00eaff22 1px, transparent 1px),
        linear-gradient(90deg, #00eaff22 1px, transparent 1px);
      background-size: 40px 40px;
      animation: moveGrid 20s linear infinite;
      z-index: 0;
    }

    /* DARK OVERLAY */
    body::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, transparent, #000 80%);
      z-index: 0;
    }

    @keyframes moveGrid {
      from { transform: translate(0, 0); }
      to { transform: translate(-200px, -200px); }
    }

    /* MAKE CONTENT ABOVE GRID */
    .sidebar, .content {
      position: relative;
      z-index: 1;
    }

    /* SIDEBAR */
    .sidebar {
      width: 30%;
      background: rgba(0, 0, 0, 0.9);
      border-right: 2px solid #00eaff;
      box-shadow: 0 0 20px #00eaff inset;
      overflow-y: auto;
      padding: 15px;
    }

    .sidebar h2 {
      text-align: center;
      text-shadow: 0 0 10px #00eaff;
    }

    /* NAME LIST */
    .name {
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #00eaff;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
      background: rgba(0, 234, 255, 0.05);
    }

    .name:hover {
      background: #00eaff;
      color: black;
      box-shadow: 0 0 15px #00eaff;
      transform: translateX(8px);
    }

    .name.active {
      background: #00eaff;
      color: black;
      font-weight: bold;
      box-shadow: 0 0 20px #00eaff;
    }

    /* CONTENT */
    .content {
      width: 70%;
      padding: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    

    /* CARD */
    .card {
      width: 100%;
      max-width: 550px;
      padding: 25px;
      border: 2px solid #00eaff;
      border-radius: 12px;
      background: rgba(0, 234, 255, 0.05);
      box-shadow:
        0 0 10px #00eaff,
        inset 0 0 20px rgba(0, 234, 255, 0.2);
      backdrop-filter: blur(10px);
      animation: glowPulse 2s infinite;
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 10px #00eaff; }
      50% { box-shadow: 0 0 25px #00eaff; }
    }

    .card h3 {
      text-align: center;
      text-shadow: 0 0 10px #00eaff;
    }

    .card p {
      margin: 12px 0;
      border-bottom: 1px solid rgba(0,234,255,0.2);
      padding-bottom: 5px;
    }

    .card b {
      color: #7dd3fc;
    }

   .main-title {

    const text = "SYSTEM ONLINE";
const target = document.getElementById("systemText");

let i = 0;

function typeEffect() {
  if (i < text.length) {
    target.innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 80);
  }
}

    const chatBox = document.getElementById("chatBox");
const aiInput = document.getElementById("aiInput");

let isLoading = false;

aiInput.addEventListener("keypress", async function(e) {
  if (e.key === "Enter" && !isLoading) {
    isLoading = true;

    const userText = aiInput.value;
    addMessage("YOU: " + userText);

    addMessage("AI: thinking...");

    const response = await processAI(userText);

    // remove "thinking..."
    chatBox.lastChild.remove();

    addMessage("AI: " + response);

    aiInput.value = "";

    // cooldown (2 seconds)
    setTimeout(() => {
      isLoading = false;
    }, 2000);
  }
});

function addMessage(text) {
  const div = document.createElement("div");
  div.textContent = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

async function processAI(input, retry = 1) {
  try {
    const response = await fetch("https://tron-backend-i9k1.onrender.com/ai", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ input })
    });

    const data = await response.json();

    if (data.error && retry > 0) {
      return await processAI(input, retry - 1);
    }

    return data.reply || "No response.";

  } catch (error) {
    return "Server error.";
  }
}

};
});
